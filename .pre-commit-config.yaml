repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff format check
        entry: uv run ruff format --check
        language: system
        types: [python]

      - id: django-check
        name: Django system check
        entry: uv run python manage.py check
        language: system
        pass_filenames: false