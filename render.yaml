databases:
  - name: aeroreserve-db
    plan: free
    region: singapore
    databaseName: aeroreserve
    user: aeroreserve

services:
  - type: web
    name: aeroreserve
    runtime: python
    plan: free
    region: singapore

    buildCommand: >-
      pip install uv &&
      uv sync --locked --no-dev &&
      uv run python manage.py collectstatic --noinput &&
      uv run python manage.py migrate &&
      uv run python manage.py seed_airline_data

    startCommand: >-
      uv run gunicorn
      airline_reservation.wsgi:application
      --bind 0.0.0.0:$PORT

    healthCheckPath: /health/

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aeroreserve-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DJANGO_DEBUG
        value: "False"